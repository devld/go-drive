name: Nightly Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - docs/site/**
  workflow_dispatch:

permissions:
  contents: write

# Only keep the newest nightly run; cancel any in-flight one when master moves.
concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Resolve short commit sha
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  # Build the same target set as stable releases so nightly downloads cover
  # Windows, glibc Linux, and musl Linux. The nightly Docker image still uses
  # the musl artifacts by filename (see docker/release.Dockerfile).
  build:
    needs: prepare
    runs-on: ubuntu-latest
    container: debian:10
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build artifacts
        uses: ./.github/actions/build-artifacts
        with:
          version: nightly-${{ needs.prepare.outputs.short_sha }}

  release:
    name: Upsert nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: go-drive-artifacts
          path: artifacts

      # Delete and recreate the single nightly pre-release so it always points at
      # the newest master commit and sorts near the top of the releases list.
      - name: Upsert nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          latest_stable_tag="$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')"
          if [ -n "${latest_stable_tag}" ]; then
            compare_url="https://github.com/${GH_REPO}/compare/${latest_stable_tag}...${GITHUB_SHA}"
            cat > notes.md <<EOF
          Automated nightly build from the latest \`master\` commit \`${GITHUB_SHA}\`.

          Changes since the latest stable release \`${latest_stable_tag}\`: ${compare_url}

          This is a pre-release and may be unstable.
          EOF
          else
            cat > notes.md <<EOF
          Automated nightly build from the latest \`master\` commit \`${GITHUB_SHA}\`.

          No stable release was found to compare against.

          This is a pre-release and may be unstable.
          EOF
          fi

          gh release delete nightly --cleanup-tag --yes || true
          gh api -X DELETE "repos/${GH_REPO}/git/refs/tags/nightly" || true
          gh release create nightly artifacts/* \
            --prerelease \
            --target "${GITHUB_SHA}" \
            --title "Nightly Build" \
            --notes-file notes.md

  docker:
    name: Publish nightly docker image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Publish docker image
        uses: ./.github/actions/docker-publish
        with:
          release_tag: nightly
          image_tags: devld/go-drive:nightly
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
