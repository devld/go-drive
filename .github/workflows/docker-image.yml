name: Publish Docker Image from Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Already created tag"
        required: true
  # Only stable releases trigger this event. Nightly is published as a
  # pre-release, so it does not trigger the Docker stable image workflow.
  release:
    types: [released]

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Set build version
        id: version
        run: |
          set -e
          if [ "${{ github.event_name }}" = "release" ]; then
            INPUT_TAG="${{ github.event.release.tag_name }}"
          else
            INPUT_TAG="${{ github.event.inputs.tag }}"
          fi
          [[ "${INPUT_TAG}" =~ ^v[0-9.]+$ ]] || exit 1
          echo "tag=${INPUT_TAG##*/}" >> "$GITHUB_OUTPUT"
          echo "version=${INPUT_TAG##*/v}" >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Publish docker image
        uses: ./.github/actions/docker-publish
        with:
          release_tag: ${{ needs.prepare.outputs.tag }}
          image_tags: devld/go-drive:latest,devld/go-drive:${{ needs.prepare.outputs.version }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
